# =====================
# Site information
# =====================
site_name: Masoud Barani
site_description: پروفایل آنلاین و نوشته‌های مسعود بارانی درباره تکنولوژی، دنیای دیجیتال و زندگی
site_url: https://masoudbarani.ir
site_author: مسعود بارانی
copyright: پروفایل آنلاین «مسعود بارانی» با ❤️ سال ۱۴۰۴

# =====================
# Theme configuration
# =====================
theme:
  name: material
  language: fa

  logo: assets/logo.png
  favicon: assets/favicon.ico

  font:
    text: Vazirmatn
    code: Red Hat Mono

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.path
    - navigation.sections
    - toc.follow
    - navigation.top
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - search.suggest
    - search.share
    - search.highlight
    - navigation.footer
    - content.tooltips

# =====================
# Extra assets (IMPORTANT FIX)
# =====================
extra_css:
  - assets/css/site.css

extra_javascript:
  - assets/js/site.js

# =====================
# Plugins
# =====================
plugins:
  - search:
      lang: fa
      separator: ' '

  - blog:
      blog_dir: blog
      post_url_format: "{slug}"
      pagination_per_page: 5
      archive_date_format: yyyy
      categories_allowed:
        - هوش مصنوعی
        - تکنولوژی
        - زندگی

  - tags:
      tags_slugify_format: "tag:{slug}"

# =====================
# Markdown extensions
# =====================
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables

  - pymdownx.arithmatex:
      generic: true

  - pymdownx.betterem:
      smart_enable: all

  - pymdownx.caret
  - pymdownx.details

  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true

  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols

  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

  - pymdownx.tasklist:
      custom_checkbox: true

  - pymdownx.tilde

# =====================
# Navigation
# =====================
nav:
  - مسعود بارانی: index.md
  - بلاگ:
      - blog/index.md
      - برچسب‌ها: blog/tags.md
  - تماس: contact.md

# =====================
# Extra metadata (safe)
# =====================
extra:
generator: false
  social:
    - icon: fontawesome/brands/instagram
      link: https://instagram.com/masoud_b
    - icon: fontawesome/brands/linkedin-in
      link: https://linkedin.com/in/MasoudBarani
    - icon: fontawesome/brands/bluesky
      link: https://bsky.app/profile/masoudbarani.ir
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@Masoud_Barani
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/Masoud_Barani
    - icon: simple/telegram
      link: https://t.me/Masoud_Barani
    - icon: material/email
      link: mailto:Me@masoudbarani.ir
